<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAO LÀ CHÓ ĐIÊN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Impact:wght@400;700&display=swap');
        
        body {
            background: linear-gradient(45deg, #000000, #1a0000, #330000);
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            touch-action: manipulation;
        }

        .main-text {
            font-family: 'Impact', sans-serif;
            font-size: clamp(2.8rem, 12vw, 6.5rem);
            font-weight: 900;
            color: #ff0000;
            text-align: center;
            text-shadow: 
                0 0 20px #ff0000,
                0 0 40px #ffff00,
                6px 6px 0 #ffff00,
                -6px -6px 0 #ffff00;
            animation: shake 0.4s infinite alternate;
            letter-spacing: 4px;
            line-height: 1.05;
        }

        @keyframes shake {
            from { transform: rotate(-6deg) scale(1.03); }
            to { transform: rotate(6deg) scale(0.97); }
        }

        .dog {
            font-size: clamp(100px, 35vw, 180px);
            animation: bounce 0.8s infinite;
        }

        .sub {
            font-size: clamp(1.4rem, 5vw, 2.5rem);
            color: #ffff00;
            text-shadow: 0 0 15px #ff0000;
            margin-top: 10px;
        }

        .footer {
            position: absolute;
            bottom: 20px;
            font-size: 1rem;
            color: #ffaa00;
        }
    </style>
</head>
<body>
    <div class="text-center px-4 w-full">
        <div class="dog">🐕‍🦺</div>
        <h1 class="main-text">TAO LÀ<br>CHÓ ĐIÊN</h1>
        <p class="sub">🦴 GÂU GÂU GÂU 🦴</p>
    </div>

    

    <script>
        function crazyEffect() {
            const text = document.querySelector('.main-text');
            const colors = ['#ff0000', '#00ff00', '#ffff00', '#00ffff', '#ff00ff'];
            text.style.color = colors[Math.floor(Math.random() * colors.length)];
            
            // Rung mạnh
            document.body.style.transition = 'transform 0.1s';
            document.body.style.transform = 'rotate(8deg) scale(1.05)';
            setTimeout(() => {
                document.body.style.transform = 'rotate(-8deg) scale(0.95)';
            }, 100);
            setTimeout(() => {
                document.body.style.transform = 'rotate(0deg) scale(1)';
            }, 300);
        }

        // Nhấn màn hình (rất quan trọng cho mobile)
        document.addEventListener('touchstart', crazyEffect);
        document.addEventListener('click', crazyEffect);
        document.addEventListener('keydown', crazyEffect);

        // Tự động rung theo nhịp
        setInterval(() => {
            if (Math.random() > 0.6) crazyEffect();
        }, 2200);
    </script>
</body>
</html>
